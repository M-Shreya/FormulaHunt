<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Formula Directory</title>

<style>
:root {
    --bg: #0b0f19;
    --text: #f8fafc;
    --header: #111827;
    --card: #1e293b;
    --border: #334155;
    --accent: #10b981;
    --primary: #3b82f6;
    --topic-bg: #2e1065;
    --topic-active: #d946ef;
    --topic-border: #701a75;
}

body.light-theme {
    --bg: #f8fafc;
    --text: #0f172a;
    --header: #ffffff;
    --card: #ffffff;
    --border: #cbd5e1;
    --accent: #059669;
    --primary: #2563eb;
    --topic-bg: #fdf4ff;
    --topic-active: #c026d3;
    --topic-border: #f5d0fe;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    margin: 0;
    padding: 0;
}

#top {
    background: var(--header);
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
}

.back-btn {
    width: 100%;
    text-align: center;
}

@media (min-width: 768px) {
    #top {
        padding: 16px 32px;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
    }
    .back-btn {
        width: auto;
    }
}

.title {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
}

@media (min-width: 768px) {
    .title {
        font-size: 24px;
    }
}

button {
    background: var(--primary);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.2s;
}

button:hover { opacity: 0.9; }

.container {
    padding: 16px;
    max-width: 1200px;
    margin: 0 auto;
}

@media (min-width: 768px) {
    .container {
        padding: 32px;
    }
}

.tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
}

.tabs::-webkit-scrollbar, .topic-tabs-container::-webkit-scrollbar {
    display: none;
}

.tab-btn {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
}

@media (min-width: 768px) {
    .tab-btn {
        padding: 12px 24px;
    }
}

.tab-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}

.topic-tabs-container {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
    background: rgba(0, 0, 0, 0.15);
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
}

body.light-theme .topic-tabs-container {
    background: #f1f5f9;
}

.topic-btn {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
}

.topic-btn:hover {
    border-color: var(--topic-active);
    background: rgba(217, 70, 239, 0.05);
}

.topic-btn.active {
    background: var(--topic-active);
    color: white;
    border-color: var(--topic-active);
    box-shadow: 0 4px 12px rgba(217, 70, 239, 0.25);
}

.qrc-grid {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
}

.qrc-grid.active { display: grid; }

.qrc-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 16px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
}

@media (min-width: 768px) {
    .qrc-card {
        padding: 20px;
        gap: 12px;
    }
}

.qrc-q {
    font-size: 15px;
    font-weight: 700;
}

.tags-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

.qrc-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 6px;
}

.topic-tag { background: rgba(217, 70, 239, 0.15); color: #f5d0fe; }
.level-tag { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
body.light-theme .topic-tag { background: #fdf4ff; color: #a21caf; }
body.light-theme .level-tag { background: #dbeafe; color: #1d4ed8; }

.qrc-a {
    font-size: 16px;
    color: var(--primary);
    font-weight: 700;
    background: rgba(0, 0, 0, 0.15);
    padding: 12px;
    border-radius: 8px;
    border-left: 4px solid var(--primary);
    overflow-x: auto;
}

body.light-theme .qrc-a { background: #f1f5f9; }

.example-btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    font-size: 13px;
    border-radius: 6px;
    cursor: pointer;
}

.example-box {
    padding: 12px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    color: #94a3b8;
}

body.light-theme .example-box { background: #f8fafc; color: #475569; }
</style>
</head>

<body>

<div id="top">
    <div style="display:flex; gap:12px; align-items:center; width: 100%; justify-content: space-between;">
        <div class="title">📚 Formula Directory</div>
        <button id="themeToggle" style="background:transparent; color:var(--text); border:1px solid var(--border); padding:6px 12px;">☀️ Light</button>
    </div>
    <button class="back-btn" onclick="window.location.href='index.html'">← Back to Game</button>
</div>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event,'physics')">Physics</button>
        <button class="tab-btn" onclick="switchTab(event,'chemistry')">Chemistry</button>
        <button class="tab-btn" onclick="switchTab(event,'maths')">Mathematics</button>
    </div>

    <div id="topicTabsContainer" class="topic-tabs-container"></div>

    <div id="physics" class="qrc-grid active"></div>
    <div id="chemistry" class="qrc-grid"></div>
    <div id="maths" class="qrc-grid"></div>
</div>

<script src="data.js"></script>

<script>
// Disable right-click context menu
document.addEventListener('contextmenu', event => event.preventDefault());

// Block common DevTools keyboard shortcuts
document.addEventListener('keydown', event => {
  if (event.key === 'F12') {
    event.preventDefault();
  }
  if (event.ctrlKey && event.shiftKey && ['I', 'J', 'C'].includes(event.key.toUpperCase())) {
    event.preventDefault();
  }
  if (event.metaKey && event.altKey && ['I', 'J', 'C'].includes(event.key.toUpperCase())) {
    event.preventDefault();
  }
});

const themeBtn = document.getElementById("themeToggle");
if(localStorage.getItem("theme")==='light'){
    document.body.classList.add("light-theme");
    themeBtn.textContent="🌙 Dark";
}

themeBtn.onclick=()=>{
    document.body.classList.toggle("light-theme");
    if(document.body.classList.contains("light-theme")){
        localStorage.setItem("theme","light");
        themeBtn.textContent="🌙 Dark";
    }else{
        localStorage.setItem("theme","dark");
        themeBtn.textContent="☀️ Light";
    }
};

const physicsDiv = document.getElementById("physics");
const chemistryDiv = document.getElementById("chemistry");
const mathsDiv = document.getElementById("maths");
const topicTabsContainer = document.getElementById("topicTabsContainer");

let currentSubject = "physics";
let currentMathTopic = null, currentPhysicsTopic = null, currentChemistryTopic = null;

function switchTab(e, tabId){
    document.querySelectorAll('.qrc-grid').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    e.currentTarget.classList.add('active');

    currentSubject = tabId;
    renderTopicsBar();
}

function createCard(item){
    const card = document.createElement("div");
    card.className = "qrc-card";
    card.innerHTML = `
        <div class="qrc-q">${item.q}</div>
        <div class="tags-row">
            <div class="qrc-tag topic-tag">${item.topic || "General"}</div>
            <div class="qrc-tag level-tag">${item.level}</div>
        </div>
        <div class="qrc-a">${item.full || item.a}</div>
        <button class="example-btn">Show Question</button>
        <div class="example-box" style="display:none;">${item.d}</div>
    `;

    const btn = card.querySelector(".example-btn");
    const box = card.querySelector(".example-box");
    btn.addEventListener("click", () => {
        if(box.style.display === "none"){
            box.style.display = "block";
            btn.textContent = "Hide Question";
        }else{
            box.style.display = "none";
            btn.textContent = "Show Question";
        }
    });
    return card;
}

function renderTopicsBar() {
    topicTabsContainer.innerHTML = "";
    
    const subjectKey = currentSubject === "physics" ? "Physics" : (currentSubject === "chemistry" ? "Chemistry" : "Maths");
    const topics = [...new Set(bank.filter(x => x.subject === subjectKey).map(x => x.topic))];
    
    let currentActiveTopic = null;
    if(currentSubject === "physics") {
        if(!currentPhysicsTopic && topics.length > 0) currentPhysicsTopic = topics[0];
        currentActiveTopic = currentPhysicsTopic;
    } else if(currentSubject === "chemistry") {
        if(!currentChemistryTopic && topics.length > 0) currentChemistryTopic = topics[0];
        currentActiveTopic = currentChemistryTopic;
    } else {
        if(!currentMathTopic && topics.length > 0) currentMathTopic = topics[0];
        currentActiveTopic = currentMathTopic;
    }

    topics.forEach(topic => {
        const btn = document.createElement("button");
        btn.className = `topic-btn ${topic === currentActiveTopic ? 'active' : ''}`;
        btn.textContent = topic;
        btn.onclick = () => {
            if(currentSubject === "physics") currentPhysicsTopic = topic;
            else if(currentSubject === "chemistry") currentChemistryTopic = topic;
            else currentMathTopic = topic;
            renderTopicsBar();
        };
        topicTabsContainer.appendChild(btn);
    });

    renderCards(subjectKey, currentActiveTopic);
}

function renderCards(subjectKey, activeTopic) {
    const targetDiv = currentSubject === "physics" ? physicsDiv : (currentSubject === "chemistry" ? chemistryDiv : mathsDiv);
    
    targetDiv.innerHTML = "";

    bank.filter(x => x.subject === subjectKey && x.topic === activeTopic).forEach(item => {
        targetDiv.appendChild(createCard(item));
    });
}

renderTopicsBar();
</script>
</body>
</html>

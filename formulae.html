<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Formula Directory</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:#fff;
    font-family:'Segoe UI',Tahoma,Verdana,sans-serif;
    overflow-y:auto;
}

#top{
    background:#111827;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid #1f2937;
}

.title{
    font-size:26px;
    font-weight:bold;
    color:#10b981;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#3b82f6;
}

.container{
    padding:25px;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.tab-btn{
    background:#1e293b;
    color:white;
    border:1px solid #475569;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.tab-btn.active{
    background:#10b981;
    border-color:#10b981;
}

.qrc-grid{
    display:none;
    grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
    gap:18px;
}

.qrc-grid.active{
    display:grid;
}

.qrc-card{
    background:#1e293b;
    border:1px solid #334155;
    padding:16px;
    border-radius:10px;
    box-shadow:0 4px 6px rgba(0,0,0,0.3);
    display:flex;
    flex-direction:column;
    gap:6px;
}

.qrc-q{
    font-size:15px;
    color:#f1f5f9;
    font-weight:700;
}

.qrc-tag{
    font-size:11px;
    color:#10b981;
    background:rgba(16,185,129,0.1);
    padding:2px 6px;
    border-radius:4px;
    width:fit-content;
}

.qrc-a{
    font-size:19px;
    color:#38bdf8;
    font-weight:bold;
    background:rgba(0,0,0,0.25);
    padding:8px;
    border-radius:6px;
    margin:4px 0;
    overflow-x:auto;
    white-space:nowrap;
    border-left:3px solid #38bdf8;
}

.qrc-d{
    font-size:13px;
    color:#94a3b8;
    line-height:1.45;
}

.topic-tag{
    background:#0f766e;
    color:white;
}

.level-tag{
    background:#1e40af;
    color:white;
}
</style>
</head>

<body>

<div id="top">
    <div class="title">
        📚 Formula Directory
    </div>

    <button onclick="window.location.href='index.html'">
        ← Back to Game
    </button>
</div>

<div class="container">

    <div class="tabs">
        <button class="tab-btn active"
                onclick="switchTab(event,'physics')">
            Physics
        </button>

        <button class="tab-btn"
                onclick="switchTab(event,'chemistry')">
            Chemistry
        </button>

        <button class="tab-btn"
                onclick="switchTab(event,'maths')">
            Mathematics
        </button>
    </div>

    <div id="physics" class="qrc-grid active"></div>
    <div id="chemistry" class="qrc-grid"></div>
    <div id="maths" class="qrc-grid"></div>
	

</div>

<script src="data.js"></script>

<script>


const physicsDiv = document.getElementById("physics");
const chemistryDiv = document.getElementById("chemistry");
const mathsDiv = document.getElementById("maths");


let currentMathTopic = null;
let currentPhysicsTopic = null;
let currentChemistryTopic = null;

function switchTab(e, tabId){

    document.querySelectorAll('.qrc-grid')
        .forEach(x => x.classList.remove('active'));

    document.querySelectorAll('.tab-btn')
        .forEach(x => x.classList.remove('active'));

    document.getElementById(tabId)
        .classList.add('active');

    e.currentTarget.classList.add('active');

    if(tabId === "physics"){
    renderPhysicsTopics();
	}

	if(tabId === "chemistry"){
    renderChemistryTopics();
	}

	if(tabId === "maths"){
    renderMathTopics();
	}
}

function createCard(item){

    const card = document.createElement("div");

    card.className = "qrc-card";

    card.innerHTML = `
        <div class="qrc-q">${item.q}</div>

        <div style="display:flex;gap:6px;flex-wrap:wrap;">

            <div class="qrc-tag topic-tag">
                ${item.topic || "General"}
            </div>

            <div class="qrc-tag level-tag">
                ${item.level}
            </div>

        </div>

        <div class="qrc-a">
            ${item.a}
        </div>

        <div class="qrc-d">
            ${item.d}
        </div>
    `;

    return card;
}

function renderPhysicsTopics(){

    physicsDiv.innerHTML = "";

    const topics = [...new Set(
        bank
            .filter(x => x.subject === "Physics")
            .map(x => x.topic)
    )];

    const select = document.createElement("select");

    select.style.padding = "10px";
    select.style.marginBottom = "20px";
    select.style.gridColumn = "1 / -1";

    topics.forEach(topic => {
        select.innerHTML +=
            `<option value="${topic}">${topic}</option>`;
    });

    if(!currentPhysicsTopic && topics.length > 0)
        currentPhysicsTopic = topics[0];

    select.value = currentPhysicsTopic;

    select.onchange = () => {
        currentPhysicsTopic = select.value;
        renderPhysicsTopics();
    };

    physicsDiv.appendChild(select);

    bank
        .filter(x =>
            x.subject === "Physics" &&
            x.topic === currentPhysicsTopic
        )
        .forEach(item => {

            physicsDiv.appendChild(
                createCard(item)
            );

        });
}

function renderChemistryTopics(){

    chemistryDiv.innerHTML = "";

    const topics = [...new Set(
        bank
            .filter(x => x.subject === "Chemistry")
            .map(x => x.topic)
    )];

    const select = document.createElement("select");

    select.style.padding = "10px";
    select.style.marginBottom = "20px";
    select.style.gridColumn = "1 / -1";

    topics.forEach(topic => {
        select.innerHTML +=
            `<option value="${topic}">${topic}</option>`;
    });

    if(!currentChemistryTopic && topics.length > 0)
        currentChemistryTopic = topics[0];

    select.value = currentChemistryTopic;

    select.onchange = () => {
        currentChemistryTopic = select.value;
        renderChemistryTopics();
    };

    chemistryDiv.appendChild(select);

    bank
        .filter(x =>
            x.subject === "Chemistry" &&
            x.topic === currentChemistryTopic
        )
        .forEach(item => {

            chemistryDiv.appendChild(
                createCard(item)
            );

        });
}


function renderMathTopics(){

    mathsDiv.innerHTML = "";

    const topics = [...new Set(
        bank
            .filter(x => x.subject === "Maths")
            .map(x => x.topic)
    )];

    const select = document.createElement("select");

    select.style.padding = "10px";
    select.style.marginBottom = "20px";
    select.style.gridColumn = "1 / -1";

    topics.forEach(topic => {
        select.innerHTML +=
            `<option value="${topic}">${topic}</option>`;
    });

    if(!currentMathTopic && topics.length > 0)
        currentMathTopic = topics[0];

    select.value = currentMathTopic;

    select.onchange = () => {
        currentMathTopic = select.value;
        renderMathTopics();
    };

    mathsDiv.appendChild(select);

    bank
        .filter(x =>
            x.subject === "Maths" &&
            x.topic === currentMathTopic
        )
        .forEach(item => {

            mathsDiv.appendChild(
                createCard(item)
            );

        });
}

renderPhysicsTopics();

</script>

</body>
</html>

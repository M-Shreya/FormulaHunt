<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JEE Formula Hunter Pro</title>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;overflow:hidden;user-select:none;}
#top{height:100px;background:#111827;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #1f2937;}

/* Safe zone margin to ensure pulsing text animations never scale outside screen viewport boundaries */
#question-container{flex-grow:1;max-width:45%; margin-left: 45px; padding-left: 10px;}
#question{font-size:22px;font-weight:bold;margin-bottom:8px;transition:color 0.3s ease;text-shadow: 0 0 10px rgba(255,255,255,0.2);position:relative; transform-origin: left center; line-height: 1.3;}
#progressWrap{width:100%;max-width:400px;height:12px;background:#334155;border-radius:10px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,0.3);}
#progress{height:100%;width:0%;background:linear-gradient(90deg, #22c55e, #4ade80);transition:width 0.3s ease;}

#controls{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.btn-group{display:flex;gap:6px;flex-wrap: wrap;justify-content: flex-end;}
.stats-row{font-size:15px;color:#cbd5e1;font-weight:500;}
.stats-row span{font-weight:bold;color:#f8fafc;}
#score{color:#38bdf8 !important;}
#combo{color:#f59e0b !important;}
#skipped{color:#ef4444 !important;}
#done{color:#a855f7 !important;}

select, button {background:#1e293b;color:#fff;border:1px solid #475569;padding:6px 12px;border-radius:6px;font-size:14px;cursor:pointer;outline:none;}
select:hover, button:hover {background:#334155;}
#startBtn {background:#2563eb;border:none;font-weight:bold;}
#startBtn:hover {background:#3b82f6;}
#skipBtn {background:#475569;border:none;font-weight:bold;}
#skipBtn:hover {background:#64748b;}
#hintBtn {background:#d97706;border:none;font-weight:bold;}
#hintBtn:hover {background:#f59e0b;}
#qrcBtn {background:#059669;border:none;font-weight:bold;}
#qrcBtn:hover {background:#10b981;}

#arena{position:relative;height:calc(100vh - 120px);overflow:hidden;background:radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);}
.formula{position:absolute;padding:10px 16px;border-radius:12px;font-weight:bold;font-size:16px;cursor:pointer;background:rgba(15, 23, 42, 0.6);backdrop-filter:blur(4px);box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);transition:transform 0.1s ease, border 0.2s ease, box-shadow 0.2s ease;white-space:nowrap;}
.formula:hover{transform:scale(1.1);background:rgba(30, 41, 59, 0.8);z-index:10;}
.popup{position:fixed;font-size:28px;font-weight:900;pointer-events:none;z-index:9999;text-align:center;text-shadow: 0 2px 4px rgba(0,0,0,0.5);font-family:sans-serif;}

@keyframes pulse{0%{transform:scale(1);} 50%{transform:scale(1.04); text-shadow: 0 0 12px currentColor;} 100%{transform:scale(1);}}
.flashing{animation:pulse 1s infinite ease-in-out;}
@keyframes hintPulse {
  0% { transform: scale(1); box-shadow: 0 0 0px #fff; }
  50% { transform: scale(1.2) rotate(2deg); box-shadow: 0 0 25px #fff; border-color: #ffffff !important; background: #334155; }
  100% { transform: scale(1); box-shadow: 0 0 0px #fff; }
}
.hint-target { animation: hintPulse 0.6s infinite ease-in-out; z-index: 100; }
@keyframes skipAnimate {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(60px, -40px) scale(0.7); opacity: 0; }
}
.skip-pop { position: absolute; font-size: 20px; font-weight: bold; color: #94a3b8; background: rgba(51,65,85,0.9); padding: 4px 10px; border-radius: 6px; animation: skipAnimate 0.6s forwards ease-out; pointer-events: none; }

/* QRC Reference Overlay Module Layout */
#qrcModal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.97); z-index:10000; overflow-y:auto; padding:30px; box-sizing:border-box;}
.modal-header {display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #334155; padding-bottom:15px; margin-bottom:20px;}
.modal-title {font-size:26px; font-weight:bold; color:#10b981;}
.close-btn {background:#ef4444; border:none; font-size:16px; font-weight:bold; padding:8px 16px; border-radius:6px; color:#fff;}
.close-btn:hover {background:#f87171;}
.tabs {display:flex; gap:10px; margin-bottom:20px;}
.tab-btn {background:#1e293b; padding:10px 20px; border:1px solid #475569; border-radius:6px; font-weight:bold; color:#fff;}
.tab-btn.active {background:#10b981; border-color:#10b981;}
.qrc-grid {display:none; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap:18px;}
.qrc-grid.active {display:grid;}
.qrc-card {background:#1e293b; border:1px solid #334155; padding:16px; border-radius:10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display:flex; flex-direction:column; gap:6px;}
.qrc-q {font-size:15px; color:#f1f5f9; font-weight:700;}
.qrc-tag {font-size:11px; color:#10b981; background:rgba(16,185,129,0.1); padding:2px 6px; border-radius:4px; width:fit-content; margin-top:2px;}
.qrc-a {font-size:19px; color:#38bdf8; font-weight:bold; background:rgba(0,0,0,0.25); padding:8px; border-radius:6px; margin:4px 0; overflow-x: auto; white-space: nowrap; border-left:3px solid #38bdf8;}
.qrc-d {font-size:13px; color:#94a3b8; line-height:1.45;}
</style>
</head>
<body>

<div id="question-container">
<div id="question" class="flashing">Press Start to Hunt!</div>
<div id="progressWrap"><div id="progress"></div></div>

<div id="controls">

<button id="skipBtn">Skip (-10)</button>
<button id="qrcBtn">Formula Directory (QRC)</button>
</div>
<div class="stats-row">

Combo: <span id="combo">0</span> |
Skipped: <span id="skipped">0</span> |

</div>
</div>
</div>

<div id="arena"></div>

  document.querySelectorAll('.qrc-grid').forEach(grid => grid.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  if (e && e.currentTarget) e.currentTarget.classList.add('active');
};

  const closeQrcBtn = document.getElementById("closeQrcBtn");
  const qrcModal = document.getElementById("qrcModal");

  function buildQrcDirectory() {
    const physDiv = document.getElementById("qrc-physics");
    const chemDiv = document.getElementById("qrc-chemistry");
    const mathDiv = document.getElementById("qrc-maths");
    
    bank.forEach(item => {
      const card = document.createElement("div");
      card.className = "qrc-card";
      card.innerHTML = `
        <div class="qrc-q">${item.q}</div>
        <div class="qrc-tag">${item.level.join(', ')}</div>
        <div class="qrc-a">${escapeHtml(item.a)}</div>
        <div class="qrc-d">${item.d}</div>
      `;
      if(item.subject === "Physics") physDiv.appendChild(card);
      if(item.subject === "Chemistry") chemDiv.appendChild(card);
      if(item.subject === "Maths") mathDiv.appendChild(card);
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function play(freq1, freq2, dur) {
    try {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;
      const c = new AudioContextClass();
      const o = c.createOscillator();
      const g = c.createGain();
      o.frequency.value = freq1;
      o.frequency.exponentialRampToValueAtTime(freq2, c.currentTime + dur);
      o.connect(g); g.connect(c.destination);
      g.gain.value = 0.04;
      o.start(); o.stop(c.currentTime + dur);
    } catch(err) {
      console.log("Audio skipped cleanly.");
    }
  }

  function popup(text, x, y, color) {
    const d = document.createElement("div");
    d.className = "popup";
    d.innerHTML = text;
    d.style.left = x + "px";
    d.style.top = y + "px";
    d.style.color = color;
    document.body.appendChild(d);
    
    let tx = window.innerWidth - 180, ty = 40;
    let sx = x, sy = y, step = 0;
    let t = setInterval(() => {
      step += 0.04;
      d.style.left = (sx + (tx - sx) * step) + "px";
      d.style.top = (sy + (ty - sy) * step) + "px";
      d.style.opacity = 1 - step;
      if (step >= 1) { clearInterval(t); d.remove(); }
    }, 20);
  }

  function spawnFormula(item) {
    if (!item) return;
    const e = document.createElement("div");
    e.className = "formula";
    e.innerText = item.a;
    e.dataset.answer = item.a;

    const c = colors[Math.floor(Math.random() * colors.length)];
    e.style.color = c;
    e.style.border = "2px solid " + c;

    e.style.left = Math.max(15, Math.random() * (window.innerWidth - 300)) + "px";
    e.style.top = Math.max(15, Math.random() * (window.innerHeight - 260)) + "px";

    e.vx = (Math.random() * 0.5 + 0.3) * (Math.random() < .5 ? -1 : 1) * velocityMultiplier;
    e.vy = (Math.random() * 0.5 + 0.3) * (Math.random() < .5 ? -1 : 1) * velocityMultiplier;

    e.onclick = (ev) => handleClick(ev, e);
    arena.appendChild(e);
  }

  function startGame() {
    arena.innerHTML = "";
    score = 0; combo = 0; current = 0; skippedCount = 0;
    
    if(scoreEl) scoreEl.innerText = score;
    if(comboEl) comboEl.innerText = combo;
    if(skippedEl) skippedEl.innerText = skippedCount;
    gameActive = true;

    const chosenLevel = document.getElementById("level").value;
    const chosenSub = document.getElementById("subject").value;

    if (chosenLevel === "MHCET") {
      velocityMultiplier = 0.8;
      levelScoreFactor = 0.8;
    } else if (chosenLevel === "JEE") {
      velocityMultiplier = 1.3;
      levelScoreFactor = 1.0;
    } else { 
      velocityMultiplier = 2.1; 
      levelScoreFactor = 1.6;
    }
    
    pool = bank.filter(x => {
      const matchSub = (chosenSub === "All" || x.subject === chosenSub);
      const matchLevel = x.level.includes(chosenLevel);
      return matchSub && matchLevel;
    });

    pool = pool.sort(() => Math.random() - 0.5);

    if (pool.length === 0) {
      question.innerHTML = "No formulas match this choice pattern selection!";
      question.style.color = "#ef4444";
      gameActive = false;
      return;
    }

    const firstCount = Math.min(maxVisible, pool.length);
    for (let i = 0; i < firstCount; i++) {
      spawnFormula(pool[i]);
    }
    nextQuestion();
    play(500, 900, 0.15); 
  }

  function nextQuestion() {
    if (!question || !progress || !done) return;
    if (current >= pool.length) {
      question.innerHTML = "🏆 Formula Hunt Complete!";
      question.style.color = "#00ff66";
      progress.style.width = "100%";
      done.innerText = pool.length + "/" + pool.length;
      gameActive = false;
      return;
    }
    
    question.innerHTML = `<span style="font-size:12px; text-transform:uppercase; letter-spacing:1px; opacity:0.75; color:#94a3b8;">[${pool[current].subject} - ${document.getElementById("level").value}]</span><br>${pool[current].q}`;
    question.style.color = colors[Math.floor(Math.random() * colors.length)];
    done.innerText = current + "/" + pool.length;
    progress.style.width = ((current / pool.length) * 100) + "%";
  }

  function handleClick(ev, el) {
    if(!gameActive || current >= pool.length) return;
    const correct = pool[current].a;

    if (el.dataset.answer === correct) {
      let pts = Math.round((100 + combo * 10) * levelScoreFactor);
      score += pts;
      combo++;

      play(500, 900, 0.15);
      const rewardMsg = praise[Math.floor(Math.random() * praise.length)];
      popup(`+${pts}<br><span style="font-size:15px;">${rewardMsg}</span>`, ev.clientX, ev.clientY, "#22c55e");

      el.remove();

      const nextIndex = maxVisible + current;
      if (nextIndex < pool.length) {
        spawnFormula(pool[nextIndex]);
      }

      current++;
      nextQuestion();
    } else {
      score = Math.max(0, score - Math.round(25 * levelScoreFactor));
      combo = 0;
      play(300, 120, 0.25);
      popup("-" + Math.round(25 * levelScoreFactor), ev.clientX, ev.clientY, "#ef4444");
    }

    if(scoreEl) scoreEl.innerText = score;
    if(comboEl) comboEl.innerText = combo;
  }

  function skipQuestion() {
    if(!gameActive || current >= pool.length || !question) return;

    const pBox = document.createElement("div");
    pBox.className = "skip-pop";
    pBox.innerText = "Skipped!";
    pBox.style.left = "25px";
    pBox.style.top = "10px";
    question.appendChild(pBox);
    setTimeout(() => pBox.remove(), 600);

    play(400, 150, 0.2);

    score = Math.max(0, score - Math.round(10 * levelScoreFactor));
    combo = 0;
    skippedCount++;
    
    if(scoreEl) scoreEl.innerText = score;
    if(comboEl) comboEl.innerText = combo;
    if(skippedEl) skippedEl.innerText = skippedCount;

    const correctAns = pool[current].a;
    const targets = document.querySelectorAll(".formula");
    for (let target of targets) {
      if (target.dataset.answer === correctAns) {
        target.remove();
        const nextIndex = maxVisible + current;
        if (nextIndex < pool.length) {
          spawnFormula(pool[nextIndex]);
        }
        break;
      }
    }

    current++;
    nextQuestion();
  }

  function triggerHint() {
    if(!gameActive || current >= pool.length) return;
    
    const correctAns = pool[current].a;
    const targets = document.querySelectorAll(".formula");
    
    let targetElement = null;
    for (let target of targets) {
      if (target.dataset.answer === correctAns) {
        targetElement = target;
        break;
      }
    }

    if(targetElement && !targetElement.classList.contains("hint-target")) {
      score = Math.max(0, score - Math.round(50 * levelScoreFactor));
      if(scoreEl) scoreEl.innerText = score;
      play(600, 800, 0.12);

      targetElement.classList.add("hint-target");
      setTimeout(() => {
        if(targetElement) targetElement.classList.remove("hint-target");
      }, 2500);
    }
  }

  function animate() {
    const elements = document.querySelectorAll(".formula");
    const arenaWidth = arena.clientWidth;
    const arenaHeight = arena.clientHeight;

    elements.forEach(el => {
      let x = parseFloat(el.style.left) || 0;
      let y = parseFloat(el.style.top) || 0;

      x += el.vx; 
      y += el.vy;

      if (x <= 0) { x = 0; el.vx *= -1; }
      else if (x + el.offsetWidth >= arenaWidth) { x = arenaWidth - el.offsetWidth; el.vx *= -1; }

      if (y <= 0) { y = 0; el.vy *= -1; }
      else if (y + el.offsetHeight >= arenaHeight) { y = arenaHeight - el.offsetHeight; el.vy *= -1; }

      el.style.left = x + "px";
      el.style.top = y + "px";
    });
    requestAnimationFrame(animate);
  }

  if (qrcBtn) qrcBtn.addEventListener('click', () => { qrcModal.style.display = "block"; });
  if (closeQrcBtn) closeQrcBtn.addEventListener('click', () => { qrcModal.style.display = "none"; });

  if (startBtn) startBtn.addEventListener('click', startGame);
  if (skipBtn) skipBtn.addEventListener('click', skipQuestion);
  if (hintBtn) hintBtn.addEventListener('click', triggerHint);
  
  buildQrcDirectory();
  animate();
});
</script>
</body>
</html>
